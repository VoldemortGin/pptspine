name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ----------------------------------------------------------------- lint
  lint:
    name: lint (fmt / clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain (pinned)
        uses: dtolnay/rust-toolchain@1.96.0
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      # PyO3 extension-module crates need an interpreter on the host for the
      # `cargo` (clippy/test) link path.
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: rustfmt
        run: cargo fmt --all --check
      - name: clippy (-D warnings)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  # ----------------------------------------------------------------- test
  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.96.0
      - uses: Swatinem/rust-cache@v2
      # The OCR tests run against the git-dep ocrspine's compile-time
      # `CARGO_MANIFEST_DIR/models` weights, fetched by cargo.
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # Exclude `py-bindings`: it's a PyO3 `extension-module` cdylib that has no
      # `#[test]`s and cannot link a test binary without an interpreter (macOS's
      # linker rejects the undefined `Py*` symbols; Linux tolerates them). It's
      # validated by the `pytest` job below (maturin develop + Python tests), so
      # excluding it here loses no coverage and makes `cargo test` pass on macOS.
      - name: cargo test --workspace --all-features
        run: cargo test --workspace --exclude py-bindings --all-features

  # ----------------------------------------------------------------- pytest
  pytest:
    name: pytest (py${{ matrix.python }} / ${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.96.0
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      # `pdfspine` is the PyMuPDF-compatible read-back engine the PDF-export gates
      # rasterize + score against (page count / rect / get_text_words / SSIM). It
      # ships no `conformance/` source, so the gates replicate its scoring math
      # in-repo; the pip package supplies only the reader.
      - name: Install maturin + test deps
        run: pip install "maturin>=1.12,<2" pytest "pdfspine>=0.3"
      # Editable install builds the extension WITH OCR compiled in (ppt-ocr is a
      # non-optional workspace member) and ships the in-repo `pptspine/_models`
      # weights, so the OCR test recognizes the bundled fixture offline.
      - name: Build + install (editable; pip 走 maturin PEP 660)
        run: pip install -e .
      - name: pytest
        run: pytest
      # Self-render SSIM gate (PRD-PDF-EXPORT B-11 gate (4)): our `to_pdf()` raster
      # vs committed `.ssimref` references, per-page SSIM >= 0.97. Font-substitution
      # variance makes it runner-sensitive (PRD §9 risk 5), so it is committed on a
      # pinned-font runner and enforced on ONE (ubuntu / py3.12) only — the default
      # `pytest` run above skips it unless PPTSPINE_SSIM_GATE is set.
      - name: Self-render SSIM gate (pinned-font runner only)
        if: matrix.os == 'ubuntu-latest' && matrix.python == '3.12'
        env:
          PPTSPINE_SSIM_GATE: "1"
        run: pytest python/tests/test_ssim_gate.py -q

  # ----------------------------------------------------------------- wheels
  wheels:
    name: wheels (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.96.0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build abi3 wheel
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --out dist --strip
      # Install the just-built wheel into a clean env and run a real PP-OCRv5
      # recognition on the bundled models — the same gate the release uses, so CI
      # catches a model-bundling regression before a tag is ever pushed.
      - name: Wheel OCR smoke (install + real recognition)
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install --no-index --find-links dist pptspine
          python -c "import pptspine; print('pptspine', pptspine.__version__)"
          python scripts/ocr_smoke.py python/tests/fixtures/ocr_sample.png
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: dist/*.whl
